apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: parity-building-analysis-tool
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/startup-cpu-boost: "true"
        autoscaling.knative.dev/maxScale: "20"
    spec:
      serviceAccountName: 903474499840-compute@developer.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - name: app
          image: us-east4-docker.pkg.dev/building-analysis-tool/cloud-run-source-deploy/parity-building-analysis-tool/parity-building-analysis-tool:latest
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
          startupProbe:
            tcpSocket:
              port: 8080
            timeoutSeconds: 240
            periodSeconds: 240
            failureThreshold: 1
          env:
            # --- plain (non-secret) config ---
            - name: RESULTS_BUCKET
              value: parity-build-tool-results
            - name: GCP_PROJECT
              value: building-analysis-tool
            - name: TASKS_QUEUE
              value: default
            - name: TASKS_LOCATION
              value: us-east4
            - name: TASK_HANDLER_URL
              value: https://parity-building-analysis-tool-903474499840.us-east4.run.app/tasks
            - name: TASK_AUTH_AUDIENCE
              value: https://parity-building-analysis-tool-903474499840.us-east4.run.app
            - name: UPLOAD_FOLDER
              value: /tmp/uploads
            - name: SIGNING_SERVICE_ACCOUNT
              value: 903474499840-compute@developer.gserviceaccount.com
            - name: STORAGE_SIGNING_SERVICE_ACCOUNT
              value: 903474499840-compute@developer.gserviceaccount.com
            - name: TASKS_SA_EMAIL
              value: 903474499840-compute@developer.gserviceaccount.com

            # --- secrets from Secret Manager (no plaintext here) ---
            - name: MAPBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: MAPBOX_API_KEY
                  key: latest
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_API_KEY
                  key: latest
            - name: TASK_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: TASK_SHARED_SECRET
                  key: latest